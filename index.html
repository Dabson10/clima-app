<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title></title>
    <link rel="stylesheet" href="/src/style/index.css">
    <!-- Fuentes -->
    <link rel="stylesheet" href="https://rsms.me/inter/inter.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:ital,wght@0,100..700;1,100..700&display=swap"
        rel="stylesheet">
    <!--  -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Raleway:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">
</head>

<body class="box-content bg-gray-600 font-raleway font-extralight">
    <video class="absolute -z-1 top-0 left-0 object-cover h-screen w-screen" autoplay loop muted playsinline
        src="/public/28236-368501609.mp4"></video>

    <section class="z-1 flex justify-between h-screen w-full relative text-white">
        <!-- Seccion izquierda. -->
        <div class="w-full h-full flex flex-col justify-center px-10 py-10">
            <!-- Seccion de -->
            <div class="h-1/8 flex items-center ">
                <p>El clima con <a href="https://github.com/Dabson10" target="_blank">Dabson</a>.</p>
            </div>
            <div class="h-full flex items-end gap-5 ">
                <p class="text-8xl font-normal">08°</p>
                <div class="">
                    <p class="text-4xl">Ciudad de México</p>
                    <p class="text-xl">
                        <span>09:05</span>
                        <span>Miercoles</span>
                        <span>06/May/26</span>
                    </p>
                </div>
                <!-- Icono del clima -->
                <svg class="size-13" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                    class="lucide lucide-cloud-hail-icon lucide-cloud-hail">
                    <path d="M4 14.899A7 7 0 1 1 15.71 8h1.79a4.5 4.5 0 0 1 2.5 8.242" />
                    <path d="M16 14v2" />
                    <path d="M8 14v2" />
                    <path d="M16 20h.01" />
                    <path d="M8 20h.01" />
                    <path d="M12 16v2" />
                    <path d="M12 22h.01" />
                </svg>
            </div>
        </div>
        <!-- Seccion derecha. -->
        <main class="w-1/2 h-full px-10 flex flex-col items-center  bg-white/10 backdrop-blur-xs text-white">

            <div class="flex justify-center pt-3 mb-5 gap-5 w-full ">
                <input class="text-lg px-7 border-b  focus:border-blue-400 outline-none" type="text"
                    placeholder="Ingrese una ciudad." required autocomplete="address-level1">

                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5"
                    stroke="currentColor" class="size-7  cursor-pointer hover:text-gray-950 ">
                    <path stroke-linecap="round" stroke-linejoin="round"
                        d="m21 21-5.197-5.197m0 0A7.5 7.5 0 1 0 5.196 5.196a7.5 7.5 0 0 0 10.607 10.607Z" />
                </svg>
            </div>
            <!-- Ciudades de atajo. -->
            <div class="flex flex-col w-full  gap-3 border-y border-white/20 py-10 ">
                <p class="text-sm">Ciudades predeterminadas.</p>
                <ul>
                    <li class="list-opc">México - Ciudad de México</li>
                    <li class="list-opc">Japon - Tokio</li>
                    <li class="list-opc">Brasil - São Paulo</li>
                </ul>
            </div>
            <div class="flex flex-col w-full py-8 gap-5">
                <p class="text-sm">Detalles del clima.</p>
                <div class="flex flex-col gap-3">
                    <p class="pertenece-dato">Nubes <span class="valor-dato">20%</span></p>
                    <p class="pertenece-dato">Viento <span class="valor-dato">15km/h</span></p>
                    <p class="pertenece-dato">LLuvia <span class="valor-dato">defe</span></p>
                </div>
            </div>
        </main>
    </section>
</body>

</html>
