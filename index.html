<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ClimAap</title>
    <link rel="stylesheet" href="/src/style/index.css">
    <!-- Fuentes -->
    <link rel="stylesheet" href="https://rsms.me/inter/inter.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:ital,wght@0,100..700;1,100..700&display=swap"
        rel="stylesheet">
    <!--  -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Raleway:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">
</head>

<body class="box-content bg-gray-600 font-raleway font-extralight">
    <video id="vid-fondo" class="absolute -z-1 top-0 left-0 object-cover h-screen w-screen" autoplay loop muted
        playsinline src="/public/28236-368501609.mp4"></video>

    <section class="z-1 flex flex-col lg:flex-row justify-between h-screen w-full relative text-white">
        <!-- Seccion izquierda. -->
        <div class="w-full h-full flex flex-col  justify-center px-10 py-10">
            <div class="h-full flex items-end lg:gap-5 gap-2">
                <p id="text-grados" class="text-4xl lg:text-8xl font-normal">08°</p>
                <div class="">
                    <p id="text-ciudad" class="text-lg mlg:text-5xl">Ciudad de México</p>
                    <p class="flex lg:gap-5 gap-2  lg:text-3xl ">
                        <span id="hora">09:05</span>
                        <span id="fecha">06/May/26</span>
                    </p>
                </div>
                <!-- Icono del clima -->
                <img id="icono-clima" src="" alt="">
            </div>
        </div>
        <!-- Seccion derecha. -->
        <main
            class="flex w-full lg:w-1/2 h-auto px-10 flex-col-reverse items-center  bg-gray-900/60 backdrop-blur-xs text-white md:flex-col">
            <!-- Buscador -->
            <div class="flex justify-center pt-3 mb-5 gap-5 w-full ">
                <input id="inp-ciudad" class="text-lg px-7 border-b  focus:border-blue-400 outline-none" type="text"
                    placeholder="Ingrese una ciudad." required autocomplete="address-level1">

                <svg id="btn-buscar" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
                    stroke-width="1.5" stroke="currentColor" class="size-7  cursor-pointer hover:text-gray-950 ">
                    <path stroke-linecap="round" stroke-linejoin="round"
                        d="m21 21-5.197-5.197m0 0A7.5 7.5 0 1 0 5.196 5.196a7.5 7.5 0 0 0 10.607 10.607Z" />
                </svg>
            </div>
            <!-- Extender -->
            <div class="flex w-full justify-center gap-5 cursor-pointer lg:hidden" id="extender">
                <svg class="size-6 transition duration-700 ease-in-out svg-bnt" xmlns="http://www.w3.org/2000/svg"
                    fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" d="m4.5 15.75 7.5-7.5 7.5 7.5" />
                </svg>
                Extender
                <svg class="size-6 transition duration-700 ease-in-out  svg-bnt" xmlns="http://www.w3.org/2000/svg"
                    fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" d="m4.5 15.75 7.5-7.5 7.5 7.5" />
                </svg>

            </div>
            <!-- Información simple -->
            <div id="infoSimple" class="hidden lg:flex flex-col w-full py-8 gap-5">
                <p class="text-sm">Detalles del clima.</p>
                <div id="contData" class="flex flex-col gap-3 p-4 lg:p-0"></div>
            </div>
            <footer class="lg:mt-auto py-2 text-sm">
                <p>El clima, hecha por<a class="hover:bg-pink-700 rounded-md p-1" href="https://github.com/Dabson10"
                        target="_blank">Dabson</a>.</p>
            </footer>
        </main>
    </section>
    <script type="module" src="/js/index.js"></script>
</body>

</html>
